

@if (!memberService.editMode()) {
    <!-- | async 
        pega um Observable (ou Promise), se inscreve nele, espera o valor chegar, 
        entrega esse valor para o template e cancela a inscrição automaticamente quando não precisa mais. 
    -->
    <!-- @if(photos$ | async; as photos) { -->
    @if(photos(); as photos) {
        @if(photos.length > 0) {
            <div class="grid grid-cols-4 auto-rows-min gap-3 p-5 h-[70vh] overflow-auto">
                @for (photo of photos; track photo.id) {
                    <div class="relative">
                        <img src="{{photo.url}}" alt="photo of member" class="w-full rounded-lg">
                        
                        @if (accountService.currentUser()?.id === memberService.member()?.id) {
                            <app-star-button 
                                (clickEvent)="setMainPhoto(photo)" 
                                [disabled]="photo.url === memberService.member()?.imageUrl"
                                [selected]="photo.url === memberService.member()?.imageUrl"
                                class="absolute top-1 right-1"
                            />
                            <app-delete-button 
                                [disabled]="photo.url === memberService.member()?.imageUrl"
                                (clickEvent)="deletePhoto(photo)"
                                class="absolute top-1 left-1"
                            />
                        }
                    </div>
                }
            </div>
        } @else {
            <div class="text-center text-gray-500">No photos available</div>
        }
    }
} @else {
    <app-image-upload (uploadFile)="onUploadImage($event)" [loading]="loading()"/>
}
